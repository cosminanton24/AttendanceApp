name: .NET CI Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj

      - name: Restore
        shell: bash
        run: dotnet restore

      - name: Build (Release)
        shell: bash
        run: dotnet build --configuration Release --no-restore

      - name: Test
        shell: bash
        run: >
          dotnet test
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=test_results.trx"
          --filter "Category!=LocalIntegration"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ runner.os }}
          path: |
            **/TestResults/*.trx
  sonarqube:
    name: SonarCloud (analysis + coverage import)
    runs-on: ubuntu-latest

    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj

      - name: Setup Java 17 (required by SonarScanner for .NET)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        shell: bash
        run: dotnet restore

      - name: Create coverlet.runsettings (OpenCover)
        shell: bash
        run: |
          cat > coverlet.runsettings << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RunSettings>
            <DataCollectionRunSettings>
              <DataCollectors>
                <DataCollector friendlyName="XPlat Code Coverage">
                  <Configuration>
                    <Format>opencover</Format>
                  </Configuration>
                </DataCollector>
              </DataCollectors>
            </DataCollectionRunSettings>
          </RunSettings>
          EOF

      - name: SonarScanner begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        shell: bash
        run: |
          dotnet sonarscanner begin \
            /k:"${SONAR_PROJECT_KEY}" \
            /o:"${SONAR_ORGANIZATION}" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"
            /d:sonar.exclusions="**/wwwroot/**"

      - name: Build (Release)
        shell: bash
        run: dotnet build  --configuration Release --no-restore

      - name: Test (with OpenCover coverage)
        shell: bash
        run: >
          dotnet test
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=test_results.trx"
          --collect "XPlat Code Coverage"
          --settings coverlet.runsettings
          --filter "Category!=LocalIntegration"

      - name: SonarScanner end
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"
